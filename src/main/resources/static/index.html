<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto AI Doc - Integrated Analyzer</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 파일명 입력 영역 스타일 */
        .filename-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filename-input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filename-input:focus {
            border-color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        .upload-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .upload-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .file-list {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #cbd5e1;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .footer {
            margin-top: 50px;
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        .btn-main {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-main:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(99, 102, 241, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>API 문서 자동생성 AI 에이전트</h1>
        <p style="color: #94a3b8; margin-top: 10px;">GEMINI 기반으로 API 문서를 excel로 자동 생성</p>
    </div>

    <!-- 파일명 입력창 추가 -->
    <div class="filename-container">
        <label for="custom-filename" style="font-weight: 600; color: #818cf8; margin-left: 5px;">📄 프로젝트/파일명 입력</label>
        <input type="text" id="custom-filename" class="filename-input" placeholder="예: MyProject_API_명세서 (확장자 제외)">
    </div>

    <div class="grid">
        <div class="upload-card">
            <div class="card-title">🚀 Controllers</div>
            <div class="card-desc">ctl,controller 파일</div>
            <div class="drop-zone" id="dz-controller">
                클릭하거나 파일 드롭 (.java)
                <input type="file" id="fi-controller" multiple hidden accept=".java">
            </div>
            <div class="file-list" id="fl-controller"></div>
        </div>

        <div class="upload-card">
            <div class="card-title">⚙️ Services</div>
            <div class="card-desc">svc, service 파일</div>
            <div class="drop-zone" id="dz-service">
                클릭하거나 파일 드롭 (.java)
                <input type="file" id="fi-service" multiple hidden accept=".java">
            </div>
            <div class="file-list" id="fl-service"></div>
        </div>

        <div class="upload-card">
            <div class="card-title">📦 DTOs / Models</div>
            <div class="card-desc">idt,odt,dto 파일</div>
            <div class="drop-zone" id="dz-dto">
                클릭하거나 파일 드롭 (.java)
                <input type="file" id="fi-dto" multiple hidden accept=".java">
            </div>
            <div class="file-list" id="fl-dto"></div>
        </div>

        <div class="upload-card">
            <div class="card-title">💾 Mappers / Others</div>
            <div class="card-desc">DB 및 Mapper </div>
            <div class="drop-zone" id="dz-mapper">
                클릭하거나 파일 드롭 (.java, .xml)
                <input type="file" id="fi-mapper" multiple hidden accept=".java,.xml">
            </div>
            <div class="file-list" id="fl-mapper"></div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-main" id="btn-generate" disabled>생성</button>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 600;">AI가 전체 프로젝트 문맥을 분석 중입니다... (1분소요)</p>
    </div>

    <script>
        const categories = ['controller', 'service', 'dto', 'mapper'];
        const filesByCat = { controller: [], service: [], dto: [], mapper: [] };

        categories.forEach(cat => {
            const dz = document.getElementById(`dz-${cat}`);
            const fi = document.getElementById(`fi-${cat}`);

            dz.onclick = () => fi.click();
            fi.onchange = (e) => {
                addFiles(cat, e.target.files);
                fi.value = '';
            };

            dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('active'); };
            dz.ondragleave = () => dz.classList.remove('active');
            dz.ondrop = (e) => {
                e.preventDefault();
                dz.classList.remove('active');
                addFiles(cat, e.dataTransfer.files);
            };
        });

        function addFiles(cat, files) {
            const newFiles = Array.from(files);
            const currentNames = filesByCat[cat].map(f => f.name);
            newFiles.forEach(file => {
                if (!currentNames.includes(file.name)) filesByCat[cat].push(file);
            });
            renderFileList(cat);
            checkButtonState();
        }

        window.removeFile = function(cat, index) {
            filesByCat[cat].splice(index, 1);
            renderFileList(cat);
            checkButtonState();
        };

        function renderFileList(cat) {
            const fl = document.getElementById(`fl-${cat}`);
            fl.innerHTML = filesByCat[cat].map((f, idx) => `
                <div class="file-item">
                    <span class="file-name">📄 ${f.name}</span>
                    <button class="remove-btn" onclick="removeFile('${cat}', ${idx})">×</button>
                </div>
            `).join('');
        }

        function checkButtonState() {
            document.getElementById('btn-generate').disabled = filesByCat.controller.length === 0;
        }

        document.getElementById('btn-generate').onclick = async () => {
            const loading = document.getElementById('loading');
            const customFilename = document.getElementById('custom-filename').value.trim();
            
            loading.style.display = 'flex';

            const formData = new FormData();
            Object.keys(filesByCat).forEach(cat => {
                filesByCat[cat].forEach(file => formData.append(cat, file));
            });
            
            // 파일명 추가
            if (customFilename) {
                formData.append('fileName', customFilename);
            }

            try {
                const response = await fetch('/api/doc/analyze-integrated', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    // 사용자가 입력한 이름 또는 기본 이름 사용
                    const finalName = customFilename ? (customFilename.endsWith('.xlsx') ? customFilename : customFilename + '.xlsx') : 'Integrated_API_Spec.xlsx';
                    
                    a.download = finalName;
                    a.click();
                } else {
                    alert("분석 중 오류가 발생했습니다.");
                }
            } catch (e) {
                alert("네트워크 오류!");
            } finally {
                loading.style.display = 'none';
            }
        };
    </script>
</body>
</html>
